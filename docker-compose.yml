services:
  db:
    image: pgvector/pgvector:pg16
    container_name: biometry-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: biometry_db
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d biometry_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  vision-worker:
    image: identification-rust-base:latest
    container_name: vision-worker
    working_dir: /workspace/identification
    command: ["bash", "-lc", "ORT_LIB_DIR=\"$(find /root/.cache/ort.pyke.io -type f -name libonnxruntime_providers_shared.so -printf '%h\\n' 2>/dev/null | head -n1)\"; export LD_LIBRARY_PATH=\"/workspace/identification/target/release:/workspace/identification/target/release/deps${ORT_LIB_DIR:+:$ORT_LIB_DIR}:${LD_LIBRARY_PATH:-}\"; if [ -x target/release/vision-worker ]; then target/release/vision-worker; else cargo run --release -p vision-worker; fi"]
    cpuset: "${VISION_CPUSET:-0,1}"
    cpus: "${VISION_CPU_LIMIT:-2}"
    ports:
      - "50052:50052"
    volumes:
      - .:/workspace/identification
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - ort-cache:/root/.cache
    environment:
      RUST_LOG: "${VISION_RUST_LOG:-vision_worker=info,ort::logging=warn}"
      VISION_FORCE_CPU: "${VISION_FORCE_CPU:-1}"
      VISION_CUDA_DEVICE_ID: "${VISION_CUDA_DEVICE_ID:-}"
      VISION_CUDA_MEM_LIMIT_MB: "${VISION_CUDA_MEM_LIMIT_MB:-1024}"
      VISION_INTRA_THREADS: "${VISION_INTRA_THREADS:-2}"
      VISION_INTER_THREADS: "${VISION_INTER_THREADS:-1}"
      VISION_DET_SCORE_THRESHOLD: "${VISION_DET_SCORE_THRESHOLD:-0.30}"
      VISION_DET_NMS_THRESHOLD: "${VISION_DET_NMS_THRESHOLD:-0.30}"
      VISION_MIN_LIVENESS: "${VISION_MIN_LIVENESS:-0.85}"
      VISION_MIN_FACE_SIZE_PX: "${VISION_MIN_FACE_SIZE_PX:-24}"
      VISION_MIN_FACE_SHORT_RATIO: "${VISION_MIN_FACE_SHORT_RATIO:-0.30}"
      VISION_MIN_FACE_AREA_RATIO: "${VISION_MIN_FACE_AREA_RATIO:-0.0015}"
      VISION_MIN_FACE_LUMA: "${VISION_MIN_FACE_LUMA:-0.04}"
      VISION_MAX_FACE_LUMA: "${VISION_MAX_FACE_LUMA:-0.95}"
      VISION_MIN_FACE_SHARPNESS: "${VISION_MIN_FACE_SHARPNESS:-0.0015}"
      OPENBLAS_NUM_THREADS: "${OPENBLAS_NUM_THREADS:-1}"
      ORT_STRATEGY: "${ORT_STRATEGY:-download}"
      LD_LIBRARY_PATH: "/workspace/identification/target/release:/workspace/identification/target/release/deps:${LD_LIBRARY_PATH:-}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
    gpus: all
    depends_on:
      db:
        condition: service_healthy

  audio-worker:
    image: identification-rust-base:latest
    container_name: audio-worker
    working_dir: /workspace/identification
    command: ["bash", "-lc", "ORT_LIB_DIR=\"$(find /root/.cache/ort.pyke.io -type f -name libonnxruntime_providers_shared.so -printf '%h\\n' 2>/dev/null | head -n1)\"; export LD_LIBRARY_PATH=\"/workspace/identification/target/release:/workspace/identification/target/release/deps${ORT_LIB_DIR:+:$ORT_LIB_DIR}:${LD_LIBRARY_PATH:-}\"; if [ -x target/release/audio-worker ]; then target/release/audio-worker; else cargo run --release -p audio-worker; fi"]
    cpuset: "${AUDIO_CPUSET:-2,3}"
    cpus: "${AUDIO_CPU_LIMIT:-2}"
    ports:
      - "50053:50053"
    volumes:
      - .:/workspace/identification
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - ort-cache:/root/.cache
    environment:
      RUST_LOG: "${AUDIO_RUST_LOG:-audio_worker=info,ort::logging=warn}"
      AUDIO_FORCE_CPU: "${AUDIO_FORCE_CPU:-1}"
      AUDIO_USE_CUDA: "${AUDIO_USE_CUDA:-0}"
      AUDIO_CUDA_MEM_LIMIT_MB: "${AUDIO_CUDA_MEM_LIMIT_MB:-256}"
      AUDIO_INTRA_THREADS: "${AUDIO_INTRA_THREADS:-2}"
      AUDIO_INTER_THREADS: "${AUDIO_INTER_THREADS:-1}"
      AUDIO_SPEECH_RMS_MIN: "${AUDIO_SPEECH_RMS_MIN:-0.004}"
      AUDIO_SPEECH_ACTIVE_RATIO_MIN: "${AUDIO_SPEECH_ACTIVE_RATIO_MIN:-0.008}"
      OPENBLAS_NUM_THREADS: "${OPENBLAS_NUM_THREADS:-1}"
      ORT_STRATEGY: "${ORT_STRATEGY:-download}"
      LD_LIBRARY_PATH: "/workspace/identification/target/release:/workspace/identification/target/release/deps:${LD_LIBRARY_PATH:-}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
    gpus: all
    depends_on:
      db:
        condition: service_healthy

  gateway-service:
    image: identification-rust-base:latest
    container_name: gateway-service
    privileged: true
    working_dir: /workspace/identification
    command: ["bash", "-lc", "cargo run --release -p gateway-service"]
    cpuset: "${GATEWAY_CPUSET:-0-3}"
    cpus: "${GATEWAY_CPU_LIMIT:-2}"
    ports:
      - "50051:50051"
    volumes:
      - .:/workspace/identification
      - /dev:/dev
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache-gateway:/workspace/identification/target
    environment:
      RUST_LOG: "${GATEWAY_RUST_LOG:-gateway_service=info}"
      RUNTIME_MODE: "${RUNTIME_MODE:-auto}"
      HOST_CPU_THREADS: "${HOST_CPU_THREADS:-}"
      HOST_PHYSICAL_CORES: "${HOST_PHYSICAL_CORES:-}"
      VISION_INTRA_THREADS: "${VISION_INTRA_THREADS:-2}"
      AUDIO_INTRA_THREADS: "${AUDIO_INTRA_THREADS:-2}"
      VISION_CPUSET: "${VISION_CPUSET:-}"
      AUDIO_CPUSET: "${AUDIO_CPUSET:-}"
      GATEWAY_CPUSET: "${GATEWAY_CPUSET:-}"
      DOOR_AGENT_CPUSET: "${DOOR_AGENT_CPUSET:-}"
      VISION_CPU_LIMIT: "${VISION_CPU_LIMIT:-}"
      AUDIO_CPU_LIMIT: "${AUDIO_CPU_LIMIT:-}"
      GATEWAY_CPU_LIMIT: "${GATEWAY_CPU_LIMIT:-}"
      DOOR_AGENT_CPU_LIMIT: "${DOOR_AGENT_CPU_LIMIT:-}"
      DATABASE_URL: "postgres://user:password@db:5432/biometry_db"
      AUDIO_URL: "http://audio-worker:50053"
      VISION_URL: "http://vision-worker:50052"
      DOOR_AGENT_URL: "http://door-agent:50054"
      FACE_SIMILARITY_THRESHOLD: "${FACE_SIMILARITY_THRESHOLD:-0.36}"
      VOICE_SIMILARITY_THRESHOLD: "${VOICE_SIMILARITY_THRESHOLD:-0.45}"
      ACCESS_STRICT_FACE_DISTANCE: "${ACCESS_STRICT_FACE_DISTANCE:-0.36}"
      FACE_MATCH_MIN_MARGIN: "${FACE_MATCH_MIN_MARGIN:-0.18}"
      FACE_SINGLE_STRICT_DISTANCE: "${FACE_SINGLE_STRICT_DISTANCE:-0.28}"
      ACCESS_MIN_CONFIDENCE: "${ACCESS_MIN_CONFIDENCE:-0.60}"
      ACCESS_FACE_LIVE_WEIGHT: "${ACCESS_FACE_LIVE_WEIGHT:-0.40}"
      ACCESS_FACE_MATCH_WEIGHT: "${ACCESS_FACE_MATCH_WEIGHT:-0.35}"
      ACCESS_VOICE_WEIGHT: "${ACCESS_VOICE_WEIGHT:-0.25}"
      VOICE_MISMATCH_CONFIDENCE_FACTOR: "${VOICE_MISMATCH_CONFIDENCE_FACTOR:-0.35}"
      VOICE_MATCH_CONFIDENCE_BONUS: "${VOICE_MATCH_CONFIDENCE_BONUS:-0.10}"
      VOICE_MISMATCH_CONFIDENCE_PENALTY: "${VOICE_MISMATCH_CONFIDENCE_PENALTY:-0.06}"
      VOICE_CAPTURE_CONFIDENCE_PENALTY: "${VOICE_CAPTURE_CONFIDENCE_PENALTY:-0.04}"
      ACCESS_CLIP_MIN_MOTION: "${ACCESS_CLIP_MIN_MOTION:-0.025}"
      ACCESS_CLIP_MIN_GLOBAL_MOTION: "${ACCESS_CLIP_MIN_GLOBAL_MOTION:-0.0022}"
      ACCESS_CLIP_MIN_SPATIAL_STD: "${ACCESS_CLIP_MIN_SPATIAL_STD:-0.0010}"
      ACCESS_CLIP_MIN_ACTIVE_CELL_RATIO: "${ACCESS_CLIP_MIN_ACTIVE_CELL_RATIO:-0.05}"
      ACCESS_CLIP_MOTION_EPS: "${ACCESS_CLIP_MOTION_EPS:-0.00015}"
      ACCESS_CLIP_RIGID_REQUIRE_LOW_MICRO: "${ACCESS_CLIP_RIGID_REQUIRE_LOW_MICRO:-1}"
      ACCESS_REQUIRE_SPEECH: "${ACCESS_REQUIRE_SPEECH:-0}"
      ACCESS_MIN_SPEECH_SECONDS: "${ACCESS_MIN_SPEECH_SECONDS:-0.35}"
      ACCESS_CLIP_MIN_MEDIAN_LIVENESS: "${ACCESS_CLIP_MIN_MEDIAN_LIVENESS:-0.75}"
      ACCESS_CLIP_MIN_LIVE_RATIO: "${ACCESS_CLIP_MIN_LIVE_RATIO:-0.67}"
      ACCESS_CLIP_MIN_DETECTED_RATIO: "${ACCESS_CLIP_MIN_DETECTED_RATIO:-0.67}"
      CAMERA_FRAME_TIMEOUT_MS: "${CAMERA_FRAME_TIMEOUT_MS:-5000}"
      PREFER_DOOR_AGENT_PREVIEW: "${PREFER_DOOR_AGENT_PREVIEW:-1}"
      DOOR_CONTROLLER_LOG_PATH: "${DOOR_CONTROLLER_LOG_PATH:-/workspace/identification/door_controller_state.log}"
      LOCKS_DIR: "${LOCKS_DIR:-/workspace/identification/locks}"
      CAMERA_LOCK_DIR: "${CAMERA_LOCK_DIR:-/workspace/identification/locks}"
      DOOR_OPEN_MS: "${DOOR_OPEN_MS:-5000}"
      DOOR_AUTO_OPEN_ON_GRANT: "${DOOR_AUTO_OPEN_ON_GRANT:-1}"
      DOOR_OPEN_STARTUP_WARMUP_MS: "${DOOR_OPEN_STARTUP_WARMUP_MS:-15000}"
      SYSTEM_RUN_FLAG_PATH: "${SYSTEM_RUN_FLAG_PATH:-/workspace/identification/.system_run}"
      PIPELINE_AUTO_START: "${PIPELINE_AUTO_START:-1}"
      TEST_DEVICE_ID: "${TEST_DEVICE_ID:-9999}"
    depends_on:
      db:
        condition: service_healthy
      audio-worker:
        condition: service_started
      vision-worker:
        condition: service_started

  door-agent:
    image: identification-rust-base:latest
    container_name: door-agent
    privileged: true
    working_dir: /workspace/identification
    command: ["bash", "-lc", "cargo run --release -p door-agent"]
    cpuset: "${DOOR_AGENT_CPUSET:-0-1}"
    cpus: "${DOOR_AGENT_CPU_LIMIT:-1}"
    volumes:
      - .:/workspace/identification
      - /dev:/dev
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache-door-agent:/workspace/identification/target
    environment:
      RUST_LOG: "${DOOR_AGENT_RUST_LOG:-door_agent=info}"
      GATEWAY_ADDR: "http://gateway-service:50051"
      DOOR_MAX_CLIP_FRAMES: "${DOOR_MAX_CLIP_FRAMES:-4}"
      DOOR_PRESENCE_TIMEOUT_MS: "${DOOR_PRESENCE_TIMEOUT_MS:-1500}"
      DOOR_COOLDOWN_MS: "${DOOR_COOLDOWN_MS:-900}"
      DOOR_BACKGROUND_ENABLED: "${DOOR_BACKGROUND_ENABLED:-1}"
      DOOR_BG_FRAMES: "${DOOR_BG_FRAMES:-4}"
      DOOR_BG_TICK_MS: "${DOOR_BG_TICK_MS:-100}"
      DOOR_BG_COOLDOWN_MS: "${DOOR_BG_COOLDOWN_MS:-350}"
      DOOR_BG_USE_MIC: "${DOOR_BG_USE_MIC:-1}"
      DOOR_BG_AUDIO_SECONDS: "${DOOR_BG_AUDIO_SECONDS:-2.2}"
      DOOR_CAMERA_INPUT_FPS: "${DOOR_CAMERA_INPUT_FPS:-10}"
      DOOR_CAMERA_ONE_SHOT: "${DOOR_CAMERA_ONE_SHOT:-1}"
      DOOR_CAMERA_OUTPUT_FPS: "${DOOR_CAMERA_OUTPUT_FPS:-12}"
      DOOR_CAMERA_FRAME_TIMEOUT_MS: "${DOOR_CAMERA_FRAME_TIMEOUT_MS:-1400}"
      DOOR_PREVIEW_INTERVAL_MS: "${DOOR_PREVIEW_INTERVAL_MS:-120}"
      DOOR_PREVIEW_TTL_MS: "${DOOR_PREVIEW_TTL_MS:-3000}"
      CAMERA_LOCK_DIR: "${CAMERA_LOCK_DIR:-/workspace/identification/locks}"
      SYSTEM_RUN_FLAG_PATH: "${SYSTEM_RUN_FLAG_PATH:-/workspace/identification/.system_run}"
    depends_on:
      gateway-service:
        condition: service_started

volumes:
  db-data:
    name: identification-db-data
  cargo-registry:
    name: cargo-registry
  cargo-git:
    name: cargo-git
  ort-cache:
    name: ort-cache
  target-cache-gateway:
    name: target-cache-gateway
  target-cache-door-agent:
    name: target-cache-door-agent
